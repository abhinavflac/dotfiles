# See https://wiki.hyprland.org/Configuring/Environment-variables/

# Hyprland
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland

# Environment
exec-once = sh -c 'set -a; eval "$(/usr/lib/systemd/user-environment-generators/30-systemd-environment-d-generator)"; set +a; dbus-update-activation-environment --systemd --all'

# GPU env
exec-once = sh -lc 'if [ -n "${GPU_SETUP:-}" ] && [ -r "$HOME/.config/hypr/default/gpu/$GPU_SETUP.conf" ]; then hyprctl keyword source "$HOME/.config/hypr/default/gpu/$GPU_SETUP.conf"; else hyprctl keyword source "$HOME/.config/hypr/default/gpu/gpu-detect.conf"; fi'
	
# █▀▀ █▀▀█ █░░█ █▀▀█ █▀▀ █▀▀ 
# ▀▀█ █░░█ █░░█ █▄▄▀ █░░ █▀▀ 
# ▀▀▀ ▀▀▀▀ ░▀▀▀ ▀░▀▀ ▀▀▀ ▀▀▀

source = $HOME/.config/hypr/default/autostart.conf
source = $HOME/.config/hypr/default/monitors.conf
source = $HOME/.config/hypr/default/input.conf
source = $HOME/.config/hypr/default/keybindings.conf
source = $HOME/.config/hypr/default/windowrules.conf
source = $HOME/.config/hypr/default/appearance.conf
source = $HOME/.config/hypr/default/general.conf
source = $HOME/.config/hypr/userprefs.conf

source = $HOME/.config/hypr/mewline.conf

# PAW-THEME-POST-START: catppuccin-mocha
source = $HOME/.config/hypr/pawlette-catppuccin-mocha.conf
# PAW-THEME-POST-END: catppuccin-mocha

input {
	kb_options = altwin:swap_alt_win	
}

# HyprMod managed settings
source = $HOME/.config/hypr/hyprland-gui.conf

exec-once = eval $(gnome-keyring-daemon --start --components=secrets,ssh,pkcs11)
